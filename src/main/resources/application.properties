spring.application.name=bookmanage
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/bookmanage?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:123456}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.bookmanage.entity
mybatis.configuration.map-underscore-to-camel-case=true

# JWT
jwt.secret=${JWT_SECRET:bookmanage-secret-key-2024-this-is-a-very-long-key-for-hs256}
jwt.expiration=86400000
